<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign up | Terrain</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;450;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/site-nav.css?v=9">
<link rel="stylesheet" href="assets/terrain-soft.css?v=4">
<link rel="stylesheet" href="assets/auth.css?v=5">
<style>
  :root {
    --paper: #FBFAF6; --paper-2: #F3F1E8; --ink: #1B2A26; --ink-soft: #4A5A54;
    --moss: #2F6B4F; --moss-deep: #1F4D38; --line: #E3DFD2; --glow: #C7E0A8;
    --radius: 16px; --maxw: 1180px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: var(--paper); color: var(--ink); line-height: 1.6; -webkit-font-smoothing: antialiased; }
  ::selection { background: var(--glow); color: var(--ink); }
  .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 28px; }
  a { color: inherit; }
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(251,250,246,0.82); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
  }
  .nav-inner { display: flex; align-items: center; justify-content: space-between; height: 64px; }
  .logo { display: flex; align-items: center; text-decoration: none; }
  .logo-mark { height: 40px; width: auto; display: block; }
  .nav-links { display: flex; align-items: center; gap: 2px; }
</style>
</head>
<body>
<nav>
  <div class="wrap nav-inner">
    <a href="index.html" class="logo" aria-label="Terrain">
      <img src="assets/terrain-logo.png" alt="" class="logo-mark" height="40">
    </a>
    <div class="nav-links" id="siteNavMenu"></div>
    <button type="button" class="nav-toggle" id="navToggle" aria-expanded="false" aria-controls="siteNavMenu" aria-label="Open menu">
      <span class="nav-toggle-bars" aria-hidden="true">
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
      </span>
    </button>
  </div>
</nav>
<div class="nav-backdrop" id="navBackdrop" aria-hidden="true"></div>

<main class="auth-shell">
  <div class="auth-card">
    <h1>Create an account</h1>
    <p class="auth-lede">Save which projects and lessons you have started, and keep a list of faculty you have contacted.</p>
    <div class="auth-error" id="authError" role="alert"></div>
    <form id="signupForm" novalidate>
      <div class="auth-field" id="nameField">
        <label for="name">Full name</label>
        <input id="name" name="name" type="text" autocomplete="name" required placeholder="First and last name" maxlength="80">
        <div class="auth-field-error" id="nameErr"></div>
      </div>
      <div class="auth-field" id="emailField">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required placeholder="you@ucla.edu">
        <div class="auth-field-error" id="emailErr"></div>
      </div>
      <div class="auth-field" id="passwordField">
        <label for="password">Password</label>
        <div class="auth-pass-wrap">
          <input id="password" name="password" type="password" autocomplete="new-password" required minlength="8" placeholder="At least 8 characters" aria-describedby="strengthLabel">
          <button type="button" class="auth-toggle-pass" id="togglePass" aria-label="Show password">Show</button>
        </div>
        <div class="auth-strength" id="strength" data-score="0" aria-hidden="true">
          <span></span><span></span><span></span><span></span>
        </div>
        <div class="auth-strength-label" id="strengthLabel">Use 8+ characters with a letter and a number.</div>
        <div class="auth-field-error" id="passwordErr"></div>
      </div>
      <div class="auth-field" id="confirmField">
        <label for="confirm">Confirm password</label>
        <input id="confirm" name="confirm" type="password" autocomplete="new-password" required placeholder="Re-enter password">
        <div class="auth-field-error" id="confirmErr"></div>
      </div>
      <div class="auth-row" style="margin-bottom:16px;">
        <label class="auth-check"><input type="checkbox" id="remember" checked> Keep me signed in</label>
      </div>
      <label class="auth-check" style="margin-bottom:16px;">
        <input type="checkbox" id="terms" required>
        <span>I understand Terrain will store my learning progress and account details. Terrain does not sell personal data.</span>
      </label>
      <button type="submit" class="auth-submit" id="submitBtn">Create account</button>
    </form>
    <p class="auth-foot">Already have an account? <a href="login.html">Log in</a></p>
    <div class="auth-trust">
      <span>Usually takes under a minute.</span>
      <span>An account is optional. The site works without one.</span>
    </div>
  </div>
</main>

<script src="assets/site-config.js"></script>
<script src="assets/auth.js?v=4"></script>
<script src="assets/site-nav.js?v=9"></script>
<script>
(function () {
  if (window.TerrainAuth && TerrainAuth.isLoggedIn()) {
    location.replace('dashboard.html');
    return;
  }
  var form = document.getElementById('signupForm');
  var err = document.getElementById('authError');
  var btn = document.getElementById('submitBtn');
  var strengthLabels = ['Too weak', 'Weak', 'Fair', 'Good', 'Strong'];

  document.getElementById('togglePass').addEventListener('click', function () {
    var input = document.getElementById('password');
    var show = input.type === 'password';
    input.type = show ? 'text' : 'password';
    this.textContent = show ? 'Hide' : 'Show';
  });

  document.getElementById('password').addEventListener('input', function () {
    var score = TerrainAuth.passwordStrength(this.value);
    document.getElementById('strength').setAttribute('data-score', String(score));
    document.getElementById('strengthLabel').textContent =
      this.value ? strengthLabels[score] + '. ' + (TerrainAuth.passwordPolicyError(this.value) || 'Looks good.') : 'Use 8+ characters with a letter and a number.';
  });

  function clearFieldErrors() {
    ['nameField', 'emailField', 'passwordField', 'confirmField'].forEach(function (id) {
      document.getElementById(id).classList.remove('has-error');
    });
    ['nameErr', 'emailErr', 'passwordErr', 'confirmErr'].forEach(function (id) {
      var el = document.getElementById(id);
      el.textContent = '';
      el.classList.remove('is-visible');
    });
  }

  function fieldError(fieldId, errId, msg) {
    document.getElementById(fieldId).classList.add('has-error');
    var el = document.getElementById(errId);
    el.textContent = msg;
    el.classList.add('is-visible');
  }

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    clearFieldErrors();
    err.classList.remove('is-visible');

    var name = document.getElementById('name').value.trim();
    var email = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;
    var confirm = document.getElementById('confirm').value;
    var valid = true;

    if (name.length < 2) {
      fieldError('nameField', 'nameErr', 'Enter your full name.');
      valid = false;
    }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      fieldError('emailField', 'emailErr', 'Enter a valid email address.');
      valid = false;
    }
    var pwErr = TerrainAuth.passwordPolicyError(password);
    if (pwErr) {
      fieldError('passwordField', 'passwordErr', pwErr);
      valid = false;
    }
    if (password !== confirm) {
      fieldError('confirmField', 'confirmErr', 'Passwords do not match.');
      valid = false;
    }
    if (!document.getElementById('terms').checked) {
      err.textContent = 'Please confirm you agree before creating an account.';
      err.classList.add('is-visible');
      valid = false;
    }
    if (!valid) return;

    btn.disabled = true;
    btn.textContent = 'Creating account…';
    try {
      await TerrainAuth.signup(
        { name: name, email: email, password: password },
        document.getElementById('remember').checked
      );
      location.href = 'dashboard.html';
    } catch (ex) {
      err.textContent = ex.message || 'Could not create account.';
      err.classList.add('is-visible');
      btn.disabled = false;
      btn.textContent = 'Create account';
    }
  });
})();
</script>
</body>
</html>
