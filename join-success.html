<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to the list | Terrain</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #FBFAF6;
    --ink: #1B2A26;
    --ink-soft: #4A5A54;
    --moss: #2F6B4F;
    --moss-deep: #1F4D38;
    --line: #E3DFD2;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif; background: var(--paper); color: var(--ink);
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 40px 24px; text-align: center;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    max-width: 500px; background: #fff; border: 1px solid var(--line);
    border-radius: 20px; padding: 48px 36px;
    box-shadow: 0 24px 48px -24px rgba(27,42,38,.18);
  }
  h1 {
    font-family: 'Fraunces', serif; font-size: clamp(28px, 5vw, 36px);
    font-weight: 600; letter-spacing: -.02em; margin-bottom: 14px;
  }
  p { font-size: 17px; color: var(--ink-soft); line-height: 1.55; margin-bottom: 16px; }
  .note { font-size: 15px; margin-bottom: 28px; }
  a {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--moss); color: #fff; text-decoration: none;
    padding: 14px 24px; border-radius: 12px; font-weight: 500; font-size: 16px;
    transition: background .2s, transform .2s;
  }
  a:hover { background: var(--moss-deep); transform: translateY(-2px); }
</style>
</head>
<body>
  <div class="card">
    <h1>Welcome to the list</h1>
    <p>You're signed up for Terrain updates on new datasets, starter projects, and UCLA programs.</p>
    <p class="note">Check your inbox for a welcome email from us. If you don't see it, check spam or promotions.</p>
    <a href="index.html">Back to Terrain</a>
  </div>
</body>
</html>
