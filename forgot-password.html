<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot password | Terrain</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;450;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/site-nav.css?v=9">
<link rel="stylesheet" href="assets/terrain-soft.css?v=4">
<link rel="stylesheet" href="assets/auth.css?v=5">
<style>
  :root {
    --paper: #FBFAF6; --paper-2: #F3F1E8; --ink: #1B2A26; --ink-soft: #4A5A54;
    --moss: #2F6B4F; --moss-deep: #1F4D38; --line: #E3DFD2; --glow: #C7E0A8;
    --radius: 16px; --maxw: 1180px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: var(--paper); color: var(--ink); line-height: 1.6; -webkit-font-smoothing: antialiased; }
  ::selection { background: var(--glow); color: var(--ink); }
  .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 28px; }
  a { color: inherit; }
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(251,250,246,0.82); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
  }
  .nav-inner { display: flex; align-items: center; justify-content: space-between; height: 64px; }
  .logo { display: flex; align-items: center; text-decoration: none; }
  .logo-mark { height: 40px; width: auto; display: block; }
  .nav-links { display: flex; align-items: center; gap: 2px; }
</style>
</head>
<body>
<nav>
  <div class="wrap nav-inner">
    <a href="index.html" class="logo" aria-label="Terrain">
      <img src="assets/terrain-logo.png" alt="" class="logo-mark" height="40">
    </a>
    <div class="nav-links" id="siteNavMenu"></div>
    <button type="button" class="nav-toggle" id="navToggle" aria-expanded="false" aria-controls="siteNavMenu" aria-label="Open menu">
      <span class="nav-toggle-bars" aria-hidden="true">
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
      </span>
    </button>
  </div>
</nav>
<div class="nav-backdrop" id="navBackdrop" aria-hidden="true"></div>

<main class="auth-shell">
  <div class="auth-card">
    <h1>Forgot your password?</h1>
    <p class="auth-lede">Enter the email for your Terrain account. If we find a match, we will send a reset link that expires in one hour.</p>
    <div class="auth-error" id="authError" role="alert"></div>
    <div class="auth-success" id="authSuccess" role="status"></div>
    <form id="forgotForm" novalidate>
      <div class="auth-field" id="emailField">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required placeholder="you@ucla.edu">
        <div class="auth-field-error" id="emailErr"></div>
      </div>
      <button type="submit" class="auth-submit" id="submitBtn">Send reset link</button>
    </form>
    <p class="auth-foot"><a href="login.html">Back to log in</a></p>
  </div>
</main>

<script src="assets/site-config.js"></script>
<script src="assets/auth.js?v=4"></script>
<script src="assets/site-nav.js?v=9"></script>
<script>
(function () {
  var form = document.getElementById('forgotForm');
  var err = document.getElementById('authError');
  var ok = document.getElementById('authSuccess');
  var btn = document.getElementById('submitBtn');

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    err.classList.remove('is-visible');
    ok.classList.remove('is-visible');
    document.getElementById('emailField').classList.remove('has-error');
    document.getElementById('emailErr').classList.remove('is-visible');

    var email = document.getElementById('email').value.trim();
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      document.getElementById('emailField').classList.add('has-error');
      var fe = document.getElementById('emailErr');
      fe.textContent = 'Enter a valid email address.';
      fe.classList.add('is-visible');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Sendingâ€¦';
    try {
      var data = await TerrainAuth.forgotPassword(email);
      var msg = data.message || 'If an account exists for that email, you will receive reset instructions shortly.';
      if (data.devResetUrl) {
        msg += ' <br><br><strong>Local development link:</strong> <a href="' + data.devResetUrl + '">Reset password</a>';
      }
      ok.innerHTML = msg;
      ok.classList.add('is-visible');
      form.hidden = true;
    } catch (ex) {
      err.textContent = ex.message || 'Could not send reset link.';
      err.classList.add('is-visible');
      btn.disabled = false;
      btn.textContent = 'Send reset link';
    }
  });
})();
</script>
</body>
</html>
