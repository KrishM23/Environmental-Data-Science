<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in | Terrain</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;450;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/site-nav.css?v=9">
<link rel="stylesheet" href="assets/terrain-soft.css?v=4">
<link rel="stylesheet" href="assets/auth.css?v=5">
<style>
  :root {
    --paper: #FBFAF6; --paper-2: #F3F1E8; --ink: #1B2A26; --ink-soft: #4A5A54;
    --moss: #2F6B4F; --moss-deep: #1F4D38; --line: #E3DFD2; --glow: #C7E0A8;
    --radius: 16px; --maxw: 1180px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: var(--paper); color: var(--ink); line-height: 1.6; -webkit-font-smoothing: antialiased; }
  ::selection { background: var(--glow); color: var(--ink); }
  .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 28px; }
  a { color: inherit; }
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(251,250,246,0.82); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
  }
  .nav-inner { display: flex; align-items: center; justify-content: space-between; height: 64px; }
  .logo { display: flex; align-items: center; text-decoration: none; }
  .logo-mark { height: 40px; width: auto; display: block; }
  .nav-links { display: flex; align-items: center; gap: 2px; }
</style>
</head>
<body>
<nav>
  <div class="wrap nav-inner">
    <a href="index.html" class="logo" aria-label="Terrain">
      <img src="assets/terrain-logo.png" alt="" class="logo-mark" height="40">
    </a>
    <div class="nav-links" id="siteNavMenu"></div>
    <button type="button" class="nav-toggle" id="navToggle" aria-expanded="false" aria-controls="siteNavMenu" aria-label="Open menu">
      <span class="nav-toggle-bars" aria-hidden="true">
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
      </span>
    </button>
  </div>
</nav>
<div class="nav-backdrop" id="navBackdrop" aria-hidden="true"></div>

<main class="auth-shell">
  <div class="auth-card">
    <h1>Log in to your account</h1>
    <p class="auth-lede">Continue your projects, lessons, and faculty outreach from where you left off.</p>
    <div class="auth-error" id="authError" role="alert"></div>
    <div class="auth-success" id="authSuccess" role="status"></div>
    <form id="loginForm" novalidate>
      <div class="auth-field" id="emailField">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required placeholder="you@ucla.edu" aria-describedby="emailErr">
        <div class="auth-field-error" id="emailErr"></div>
      </div>
      <div class="auth-field" id="passwordField">
        <label for="password">Password</label>
        <div class="auth-pass-wrap">
          <input id="password" name="password" type="password" autocomplete="current-password" required minlength="8" placeholder="Your password" aria-describedby="passwordErr">
          <button type="button" class="auth-toggle-pass" id="togglePass" aria-label="Show password">Show</button>
        </div>
        <div class="auth-field-error" id="passwordErr"></div>
      </div>
      <div class="auth-row">
        <label class="auth-check"><input type="checkbox" id="remember" checked> Keep me signed in</label>
        <a href="forgot-password.html">Forgot password?</a>
      </div>
      <button type="submit" class="auth-submit" id="submitBtn">Log in</button>
    </form>
    <p class="auth-foot">Don’t have an account? <a href="signup.html">Sign up</a></p>
    <div class="auth-trust">
      <span>Free to use. No credit card required.</span>
      <span>Your progress is private to your account.</span>
      <span>You can browse Terrain without logging in.</span>
    </div>
  </div>
</main>

<script src="assets/site-config.js"></script>
<script src="assets/auth.js?v=4"></script>
<script src="assets/site-nav.js?v=9"></script>
<script>
(function () {
  if (window.TerrainAuth && TerrainAuth.isLoggedIn()) {
    location.replace('dashboard.html');
    return;
  }
  var form = document.getElementById('loginForm');
  var err = document.getElementById('authError');
  var ok = document.getElementById('authSuccess');
  var btn = document.getElementById('submitBtn');
  var params = new URLSearchParams(location.search);
  var next = params.get('next') || 'dashboard.html';
  if (
    next.indexOf('://') !== -1 ||
    next.indexOf('//') === 0 ||
    next.charAt(0) === '/' ||
    !/^[a-z0-9][a-z0-9._/?&=-]*\.html([?#][a-z0-9._/?&=-]*)?$/i.test(next)
  ) {
    next = 'dashboard.html';
  }
  if (params.get('reset') === '1') {
    ok.textContent = 'Password updated. Log in with your new password.';
    ok.classList.add('is-visible');
  }

  document.getElementById('togglePass').addEventListener('click', function () {
    var input = document.getElementById('password');
    var show = input.type === 'password';
    input.type = show ? 'text' : 'password';
    this.textContent = show ? 'Hide' : 'Show';
    this.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
  });

  function clearFieldErrors() {
    ['emailField', 'passwordField'].forEach(function (id) {
      document.getElementById(id).classList.remove('has-error');
    });
    ['emailErr', 'passwordErr'].forEach(function (id) {
      var el = document.getElementById(id);
      el.textContent = '';
      el.classList.remove('is-visible');
    });
  }

  function fieldError(fieldId, errId, msg) {
    document.getElementById(fieldId).classList.add('has-error');
    var el = document.getElementById(errId);
    el.textContent = msg;
    el.classList.add('is-visible');
  }

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    clearFieldErrors();
    err.classList.remove('is-visible');
    var email = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;
    var valid = true;
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      fieldError('emailField', 'emailErr', 'Enter a valid email address.');
      valid = false;
    }
    if (!password) {
      fieldError('passwordField', 'passwordErr', 'Enter your password.');
      valid = false;
    }
    if (!valid) return;

    btn.disabled = true;
    btn.textContent = 'Logging in…';
    try {
      await TerrainAuth.login(
        { email: email, password: password },
        document.getElementById('remember').checked
      );
      location.href = next;
    } catch (ex) {
      err.textContent = ex.message || 'Could not log in.';
      err.classList.add('is-visible');
      btn.disabled = false;
      btn.textContent = 'Log in';
    }
  });
})();
</script>
</body>
</html>
