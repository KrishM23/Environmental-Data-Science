<style>
  :root {
    --paper: #FBFAF6; --paper-2: #F3F1E8; --ink: #1B2A26; --ink-soft: #4A5A54;
    --moss: #2F6B4F; --moss-deep: #1F4D38; --sky: #5B8BB0; --clay: #D98E5A;
    --line: #E3DFD2; --glow: #C7E0A8; --radius: 16px; --maxw: 1180px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', sans-serif; background: var(--paper); color: var(--ink);
    line-height: 1.65; -webkit-font-smoothing: antialiased;
  }
  ::selection { background: var(--glow); color: var(--ink); }
  .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 28px; }
  a { color: inherit; }

  /* NAV */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(251,250,246,0.82); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
  }
  .nav-inner { display: flex; align-items: center; justify-content: space-between; height: 68px; }
  .logo { display: flex; align-items: center; gap: 10px; font-family: 'Fraunces', serif; font-weight: 600; font-size: 21px; color: var(--ink); text-decoration: none; }
  .logo-mark { height: 40px; width: auto; flex-shrink: 0; display: block; }
  .nav-links { display: flex; align-items: center; gap: 30px; }
  .nav-links a { color: var(--ink-soft); text-decoration: none; font-size: 15px; font-weight: 450; transition: color .2s; }
  .nav-links a:not(.nav-cta):hover, .nav-links a:not(.nav-cta).active { color: var(--moss); }
  .nav-cta { background: var(--moss); color: #fff !important; padding: 9px 18px; border-radius: 10px; font-weight: 500 !important; font-size: 14.5px !important; }
  .nav-cta:hover {  background: var(--moss-deep); color: #fff !important; }

  /* READING PROGRESS */
  .progress-bar { position: fixed; top: 0; left: 0; height: 3px; width: 0; background: var(--moss); z-index: 200; transition: width .1s linear; }

  /* HERO */
  .ls-hero { padding: 52px 0 34px; border-bottom: 1px solid var(--line); }
  .crumb { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--ink-soft); margin-bottom: 18px; display: inline-flex; align-items: center; gap: 8px; text-decoration: none; }
  .crumb:hover { color: var(--moss); }
  .ls-meta { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 18px; align-items: center; }
  .ls-tag { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; font-weight: 500; padding: 5px 11px; border-radius: 6px; text-transform: uppercase; letter-spacing: .03em; }
  .ls-tag.track { background: var(--ic-bg, var(--paper-2)); color: var(--ic-fg, var(--ink-soft)); }
  .ls-tag.lvl-beginner { background: #E8F0E0; color: #2F6B4F; }
  .ls-tag.lvl-intermediate { background: #F3F1E8; color: #8B6540; }
  .ls-tag.lvl-advanced { background: #E0EBE4; color: #1F4D38; }
  .ls-tag.tool { background: var(--paper-2); color: var(--ink-soft); }
  .ls-hero h1 { font-family: 'Fraunces', serif; font-weight: 600; font-size: clamp(32px, 4.5vw, 48px); line-height: 1.08; letter-spacing: -.025em; margin-bottom: 14px; max-width: 22ch; }
  .ls-lede { font-size: 18px; color: var(--ink-soft); max-width: 64ch; line-height: 1.6; }
  .ls-hero-actions { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-top: 22px; }
  .ls-video-btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--moss); color: #fff; text-decoration: none;
    font-size: 14.5px; font-weight: 600; padding: 11px 18px; border-radius: 10px;
    transition: background .2s, transform .2s;
  }
  .ls-video-btn:hover { background: var(--moss-deep); transform: translateY(-1px); }
  .ls-video-note { font-size: 13.5px; color: var(--ink-soft); }

  /* BODY LAYOUT */
  .ls-body { padding: 44px 0 30px; }
  .ls-layout { display: grid; grid-template-columns: minmax(0, 1fr) 290px; gap: 52px; align-items: start; }
  article.ls-article { min-width: 0; }

  /* ARTICLE ELEMENTS */
  .ls-article h2 { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 600; letter-spacing: -.02em; margin: 40px 0 14px; padding-bottom: 10px; border-bottom: 1px solid var(--line); scroll-margin-top: 84px; }
  .ls-article h2:first-child { margin-top: 0; }
  .ls-article h3 { font-family: 'Fraunces', serif; font-size: 19px; font-weight: 600; margin: 26px 0 10px; scroll-margin-top: 84px; }
  .ls-article p { color: var(--ink-soft); margin: 0 0 15px; font-size: 15.5px; }
  .ls-article p code, .ls-article li code {
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    background: var(--paper-2); padding: 2px 6px; border-radius: 5px; color: var(--moss-deep);
  }
  .ls-article strong { color: var(--ink); font-weight: 600; }
  .ls-article a.inline { color: var(--moss); text-decoration: none; font-weight: 500; border-bottom: 1px solid var(--glow); }
  .ls-article a.inline:hover { color: var(--moss-deep); }

  .ls-ul, .ls-ol { margin: 0 0 16px; padding-left: 0; list-style: none; display: flex; flex-direction: column; gap: 9px; }
  .ls-ul li { font-size: 15.5px; color: var(--ink-soft); padding-left: 20px; position: relative; }
  .ls-ul li::before { content: ''; position: absolute; left: 2px; top: .62em; width: 6px; height: 6px; border-radius: 50%; background: var(--moss); }
  .ls-ol { counter-reset: li; }
  .ls-ol li { counter-increment: li; font-size: 15.5px; color: var(--ink-soft); padding-left: 30px; position: relative; }
  .ls-ol li::before { content: counter(li); position: absolute; left: 0; top: -1px; width: 21px; height: 21px; border-radius: 6px; background: var(--paper-2); color: var(--moss); font-family: 'JetBrains Mono', monospace; font-size: 11.5px; font-weight: 500; display: flex; align-items: center; justify-content: center; }
  .ls-article li strong { color: var(--ink); }

  /* STEPS */
  .ls-steps { counter-reset: step; list-style: none; display: flex; flex-direction: column; gap: 14px; margin: 4px 0 16px; }
  .ls-steps li { counter-increment: step; padding: 16px 18px 16px 54px; position: relative; background: #fff; border: 1px solid var(--line); border-radius: 12px; font-size: 15px; color: var(--ink-soft); }
  .ls-steps li::before { content: counter(step); position: absolute; left: 16px; top: 15px; width: 28px; height: 28px; border-radius: 8px; background: var(--paper-2); font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 500; color: var(--moss); display: flex; align-items: center; justify-content: center; }

  /* CODE BLOCK */
  .ls-code { margin: 8px 0 18px; border-radius: 12px; overflow: hidden; border: 1px solid #2b3a34; background: #16211d; }
  .ls-code-bar { display: flex; align-items: center; justify-content: space-between; padding: 9px 14px; background: #111a17; border-bottom: 1px solid #243029; }
  .ls-code-lang { font-family: 'JetBrains Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: #8FB0A2; }
  .ls-copy { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #B8C8C0; background: transparent; border: 1px solid #2f4038; border-radius: 6px; padding: 4px 10px; cursor: pointer; transition: background .15s, color .15s, border-color .15s; display: inline-flex; align-items: center; gap: 6px; }
  .ls-copy:hover { background: #1f2d27; color: #fff; border-color: #3a4f45; }
  .ls-copy.copied { color: var(--glow); border-color: #3a5a3f; }
  pre.ls-pre { margin: 0; padding: 16px 18px; overflow-x: auto; font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.6; color: #E3EAE5; }
  pre.ls-pre code { font-family: inherit; }
  .ls-cap { font-size: 13px; color: var(--ink-soft); margin: -10px 0 18px; padding-left: 2px; }
  .tok-cm { color: #6E8C7E; font-style: italic; }
  .tok-str { color: #BFE0A0; }
  .tok-num { color: #E0B488; }
  .tok-kw { color: #88B6DC; }
  .tok-bi { color: #E6C07B; }

  /* CALLOUT */
  .ls-callout { padding: 16px 18px 16px 46px; border-radius: 12px; font-size: 14.5px; line-height: 1.58; border: 1px solid var(--line); margin: 8px 0 18px; position: relative; }
  .ls-callout::before { position: absolute; left: 16px; top: 15px; font-size: 15px; }
  .ls-callout p { margin-bottom: 8px; font-size: 14.5px; }
  .ls-callout p:last-child { margin-bottom: 0; }
  .ls-callout.tip { background: #EAF2E3; border-color: #C7E0A8; color: var(--moss-deep); }
  .ls-callout.tip::before { content: '\1F331'; }
  .ls-callout.warn { background: #FDF6EE; border-color: #F0D4B8; color: #8A5A32; }
  .ls-callout.warn::before { content: '\26A0\FE0F'; }
  .ls-callout.note { background: #EAF0F5; border-color: #CBDDEA; color: #3A5C76; }
  .ls-callout.note::before { content: '\1F4A1'; }
  .ls-callout strong { font-weight: 600; }
  .ls-callout code { font-family: 'JetBrains Mono', monospace; font-size: 12.5px; background: rgba(0,0,0,.05); padding: 1px 5px; border-radius: 4px; }

  /* TABLE */
  .ls-table-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: 12px; background: #fff; margin: 8px 0 18px; }
  table.ls-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .ls-table th { text-align: left; padding: 11px 15px; background: var(--paper-2); font-family: 'JetBrains Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--ink-soft); border-bottom: 1px solid var(--line); }
  .ls-table td { padding: 11px 15px; border-bottom: 1px solid var(--line); vertical-align: top; color: var(--ink-soft); }
  .ls-table tr:last-child td { border-bottom: none; }
  .ls-table td:first-child { color: var(--ink); font-weight: 500; }
  .ls-table code { font-family: 'JetBrains Mono', monospace; font-size: 12.5px; background: var(--paper-2); padding: 2px 6px; border-radius: 4px; color: var(--moss-deep); }

  /* EXERCISE */
  .ls-exercise { background: #fff; border: 1px solid var(--line); border-left: 3px solid var(--clay); border-radius: 12px; padding: 20px 22px; margin: 18px 0; }
  .ls-exercise-h { font-family: 'JetBrains Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--clay); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .ls-exercise h4 { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 600; margin-bottom: 8px; }
  .ls-exercise p { color: var(--ink-soft); font-size: 15px; margin-bottom: 12px; }
  .ls-exercise details { margin-top: 12px; border-top: 1px dashed var(--line); padding-top: 12px; }
  .ls-exercise summary { cursor: pointer; font-size: 14px; font-weight: 500; color: var(--moss); list-style: none; display: inline-flex; align-items: center; gap: 7px; }
  .ls-exercise summary::-webkit-details-marker { display: none; }
  .ls-exercise summary::before { content: '\25B8'; transition: transform .2s; display: inline-block; }
  .ls-exercise details[open] summary::before { transform: rotate(90deg); }
  .ls-exercise summary:hover { color: var(--moss-deep); }

  /* PREV / NEXT */
  .ls-pager { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 16px 0 0; }
  .ls-pager a { display: flex; flex-direction: column; gap: 4px; padding: 18px 20px; border: 1px solid var(--line); border-radius: 12px; text-decoration: none; background: #fff; transition: border-color .2s, transform .2s, box-shadow .2s; }
  .ls-pager a:hover { border-color: var(--glow); transform: translateY(-2px); box-shadow: 0 14px 30px -22px rgba(27,42,38,.3); }
  .ls-pager .dir { font-family: 'JetBrains Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--ink-soft); }
  .ls-pager .ttl { font-family: 'Fraunces', serif; font-size: 16px; font-weight: 600; color: var(--ink); }
  .ls-pager a.next { text-align: right; align-items: flex-end; }
  .ls-pager .ph { border: 1px dashed var(--line); background: transparent; pointer-events: none; }

  /* SIDEBAR */
  .ls-side { position: sticky; top: 88px; display: flex; flex-direction: column; gap: 16px; }
  .ls-card { background: #fff; border: 1px solid var(--line); border-radius: var(--radius); padding: 20px 22px; }
  .ls-card h3 { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .06em; color: var(--ink-soft); margin-bottom: 13px; }
  .ls-toc { display: flex; flex-direction: column; gap: 2px; }
  .ls-toc a { font-size: 13.5px; color: var(--ink-soft); text-decoration: none; padding: 6px 10px; border-radius: 7px; border-left: 2px solid transparent; transition: color .15s, background .15s, border-color .15s; line-height: 1.4; }
  .ls-toc a:hover { background: var(--paper-2); color: var(--moss); }
  .ls-toc a.active { color: var(--moss); border-left-color: var(--moss); background: var(--paper-2); font-weight: 500; }
  .ls-learn { display: flex; flex-direction: column; gap: 9px; }
  .ls-learn li { list-style: none; font-size: 13.5px; color: var(--ink-soft); padding-left: 24px; position: relative; line-height: 1.45; }
  .ls-learn li::before { content: ''; position: absolute; left: 2px; top: 3px; width: 15px; height: 15px; border-radius: 50%; background: #EAF2E3; }
  .ls-learn li::after { content: ''; position: absolute; left: 6px; top: 7px; width: 5px; height: 8px; border-right: 2px solid var(--moss); border-bottom: 2px solid var(--moss); transform: rotate(40deg); }
  .ls-facts { display: flex; flex-direction: column; gap: 11px; }
  .ls-fact { display: flex; justify-content: space-between; gap: 12px; font-size: 13.5px; }
  .ls-fact dt { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: .03em; }
  .ls-fact dd { color: var(--ink); font-weight: 500; text-align: right; }
  .ls-side-links { display: flex; flex-direction: column; gap: 2px; }
  .ls-side-links a { display: flex; align-items: center; gap: 8px; font-size: 13.5px; color: var(--ink); text-decoration: none; padding: 7px 8px; margin: 0 -8px; border-radius: 7px; transition: background .15s, color .15s; }
  .ls-side-links a:hover { background: var(--paper-2); color: var(--moss); }
  .ls-side-links svg { flex-shrink: 0; color: var(--ink-soft); }
  .ls-side-links a:hover svg { color: var(--moss); }
  .ls-side-links .kind { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #9AA8A1; }
  .ls-prereq { display: flex; flex-direction: column; gap: 8px; }
  .ls-prereq a { font-size: 13.5px; color: var(--moss); text-decoration: none; font-weight: 500; padding: 7px 0; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 7px; }
  .ls-prereq a:last-child { border-bottom: none; }
  .ls-prereq a:hover { color: var(--moss-deep); }
  .ls-unlock-card { background: var(--moss-deep); border: none; color: #fff; }
  .ls-unlock-card h3 { color: rgba(255,255,255,.7); }
  .ls-unlock-card p { font-size: 14px; color: rgba(255,255,255,.85); line-height: 1.5; margin-bottom: 14px; }
  .ls-unlock-btn { display: inline-flex; align-items: center; gap: 7px; background: #fff; color: var(--moss-deep); text-decoration: none; font-weight: 500; font-size: 14px; padding: 10px 16px; border-radius: 10px; transition: background .2s; }
  .ls-unlock-btn:hover { background: var(--glow); }

  /* MISSING */
  .ls-missing { text-align: center; padding: 100px 20px 120px; }
  .ls-missing h1 { font-family: 'Fraunces', serif; font-size: 32px; margin-bottom: 12px; }
  .ls-missing p { color: var(--ink-soft); margin-bottom: 24px; }
  .ls-btn { text-decoration: none; font-size: 14.5px; font-weight: 500; padding: 11px 18px; border-radius: 10px; background: var(--moss); color: #fff; display: inline-block; }
  .ls-btn:hover { background: var(--moss-deep); }

  /* FOOTER */
  footer { border-top: 1px solid var(--line); padding: 50px 0 38px; margin-top: 40px; }
  .foot-inner { display: flex; justify-content: space-between; gap: 40px; flex-wrap: wrap; }
  .foot-brand { max-width: 280px; }
  .foot-brand p { font-size: 14px; color: var(--ink-soft); margin-top: 12px; }
  .foot-cols { display: flex; gap: 64px; flex-wrap: wrap; }
  .foot-col h5 { font-size: 13px; text-transform: uppercase; letter-spacing: .06em; color: var(--ink-soft); margin-bottom: 14px; font-weight: 600; }
  .foot-col a { display: block; font-size: 14.5px; color: var(--ink); text-decoration: none; margin-bottom: 9px; }
  .foot-col a:hover { color: var(--moss); }
  .foot-bottom { margin-top: 44px; padding-top: 22px; border-top: 1px solid var(--line); font-size: 13px; color: var(--ink-soft); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
  .foot-bottom a { color: var(--moss); text-decoration: none; }

  @media (max-width: 920px) {
    .ls-layout { grid-template-columns: 1fr; }
    .ls-side { position: static; order: -1; }
    .ls-side .ls-card.toc-card { display: none; }
  }
  @media (max-width: 560px) {
    .ls-pager { grid-template-columns: 1fr; }
  }
</style>
</head>

<script>
  const trackMeta = {
    foundations: { label: 'Foundations', fg: '#2F6B4F', bg: '#E8F0E0' },
    data:        { label: 'Working with data', fg: '#1F4D38', bg: '#EAF2E3' },
    viz:         { label: 'Visualization', fg: '#8B6540', bg: '#F3F1E8' },
    stats:       { label: 'Statistics', fg: '#4A5A54', bg: '#F3F1E8' },
    geo:         { label: 'Geospatial', fg: '#1F4D38', bg: '#E0EBE4' }
  };
  const levelClass = { beginner: 'lvl-beginner', intermediate: 'lvl-intermediate', advanced: 'lvl-advanced' };

  const KW = {
    python: ['def','return','import','from','as','if','elif','else','for','while','in','not','and','or','is','None','True','False','with','try','except','finally','class','lambda','pass','break','continue','global','yield','raise','assert','del','async','await'],
    r: ['function','if','else','for','while','in','return','TRUE','FALSE','NULL','NA','Inf','NaN','library','require','break','next','repeat','c'],
    bash: ['cd','pip','conda','python','python3','Rscript','echo','export','git','source','for','do','done','in','if','then','fi','sudo','mkdir','ls'],
    text: []
  };
  const BUILTINS = {
    python: ['print','len','range','list','dict','set','tuple','int','float','str','sum','min','max','sorted','enumerate','zip','open','map','filter','round','abs','type','pd','np','plt','gpd'],
    r: ['print','sum','mean','median','sd','length','head','tail','nrow','ncol','seq','rep','paste','paste0','data.frame','read.csv','ggplot','aes','filter','mutate','summarise','summarize','group_by','select','arrange'],
    bash: [], text: []
  };

  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function highlight(code, lang){
    const kw = new Set(KW[lang] || []);
    const bi = new Set(BUILTINS[lang] || []);
    const re = /("""[\s\S]*?"""|'''[\s\S]*?'''|"(?:\\.|[^"\\])*"|'(?:\\.|[^'\\])*'|`(?:\\.|[^`\\])*`|#[^\n]*|\b\d+(?:\.\d+)?\b|[A-Za-z_.][A-Za-z0-9_.]*|\s+|[^\sA-Za-z0-9_])/g;
    let out = '', m;
    while ((m = re.exec(code))) {
      const t = m[0];
      const c0 = t[0];
      if (c0 === '"' || c0 === "'" || c0 === '`') out += `<span class="tok-str">${esc(t)}</span>`;
      else if (c0 === '#') out += `<span class="tok-cm">${esc(t)}</span>`;
      else if (/^\d/.test(t)) out += `<span class="tok-num">${esc(t)}</span>`;
      else if (kw.has(t)) out += `<span class="tok-kw">${esc(t)}</span>`;
      else if (bi.has(t)) out += `<span class="tok-bi">${esc(t)}</span>`;
      else out += esc(t);
    }
    return out;
  }

  const copyIcon = '<svg width="12" height="12" viewBox="0 0 16 16" fill="none"><rect x="5" y="5" width="8" height="9" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M11 5V3.5A1.5 1.5 0 0 0 9.5 2H4a1.5 1.5 0 0 0-1.5 1.5V11" stroke="currentColor" stroke-width="1.3"/></svg>';

  function slug(s){ return String(s).toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''); }

  const toc = [];
  function block(b){
    switch (b.type) {
      case 'h2': { const id = slug(b.text); toc.push({ id, text: b.text }); return `<h2 id="${id}">${esc(b.text)}</h2>`; }
      case 'h3': return `<h3>${esc(b.text)}</h3>`;
      case 'p': return `<p>${b.html}</p>`;
      case 'list': return `<ul class="ls-ul">${b.items.map(i => `<li>${i}</li>`).join('')}</ul>`;
      case 'olist': return `<ol class="ls-ol">${b.items.map(i => `<li>${i}</li>`).join('')}</ol>`;
      case 'steps': return `<ol class="ls-steps">${b.items.map(s => `<li><strong>${esc(s.title)}</strong> — ${s.text}</li>`).join('')}</ol>`;
      case 'code': return codeBlock(b.code, b.lang || 'text') + (b.caption ? `<div class="ls-cap">${b.caption}</div>` : '');
      case 'callout': return `<div class="ls-callout ${b.variant || 'note'}">${b.title ? `<strong>${esc(b.title)}</strong> ` : ''}${b.html}</div>`;
      case 'table': return `<div class="ls-table-wrap"><table class="ls-table"><thead><tr>${b.head.map(h => `<th>${h}</th>`).join('')}</tr></thead><tbody>${b.rows.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;
      case 'exercise': return exercise(b);
      default: return '';
    }
  }

  function codeBlock(code, lang){
    return `<div class="ls-code">
      <div class="ls-code-bar">
        <span class="ls-code-lang">${esc(lang)}</span>
        <button class="ls-copy" type="button">${copyIcon}<span>Copy</span></button>
      </div>
      <pre class="ls-pre"><code>${highlight(code, lang)}</code></pre>
    </div>`;
  }

  function exercise(b){
    const sol = b.solution ? `<details><summary>Show solution</summary>${codeBlock(b.solution.code, b.solution.lang || 'python')}${b.solution.note ? `<p style="margin-top:10px;">${b.solution.note}</p>` : ''}</details>` : '';
    return `<div class="ls-exercise">
      <div class="ls-exercise-h">✎ Your turn</div>
      ${b.title ? `<h4>${esc(b.title)}</h4>` : ''}
      <p>${b.html}</p>
      ${b.hint ? `<div class="ls-callout note" style="margin:10px 0 0;"><strong>Hint:</strong> ${b.hint}</div>` : ''}
      ${sol}
    </div>`;
  }

  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  const LESSONS = window.LESSONS || {};
  const ORDER = window.LESSON_ORDER || Object.keys(LESSONS);
  const data = id ? LESSONS[id] : null;
  const main = document.getElementById('main');

  if (!data) {
    document.title = 'Lesson not found | Terrain';
    main.innerHTML = `<div class="wrap ls-missing">
      <h1>Lesson not found</h1>
      <p>We couldn't find that lesson. Browse the full skills curriculum instead.</p>
      <a class="ls-btn" href="skills.html">Back to Skills</a>
    </div>`;
  } else {
    const tm = trackMeta[data.track] || { label: data.track, fg: '#4A5A54', bg: '#F3F1E8' };
    document.title = `${data.title} | Terrain Skills`;

    const bodyHTML = data.content.map(block).join('');

    const idx = ORDER.indexOf(id);
    const prev = idx > 0 ? LESSONS[ORDER[idx - 1]] : null;
    const prevId = idx > 0 ? ORDER[idx - 1] : null;
    const next = idx >= 0 && idx < ORDER.length - 1 ? LESSONS[ORDER[idx + 1]] : null;
    const nextId = idx >= 0 && idx < ORDER.length - 1 ? ORDER[idx + 1] : null;

    const tocHTML = toc.map(t => `<a href="#${t.id}">${esc(t.text)}</a>`).join('');
    const learnHTML = (data.learn || []).map(l => `<li>${l}</li>`).join('');
    const factsHTML = [
      ['Track', tm.label], ['Tool', data.tool], ['Level', data.level], ['Time', data.time]
    ].map(f => `<div class="ls-fact"><dt>${f[0]}</dt><dd>${esc(f[1])}</dd></div>`).join('');
    const arrow = '<svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    const extLink = '<svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M6 3H3.5A1.5 1.5 0 0 0 2 4.5v8A1.5 1.5 0 0 0 3.5 14h8a1.5 1.5 0 0 0 1.5-1.5V10M9 2h5v5M14 2L7 9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>';

    const prereqHTML = (data.prereqs || []).map(p => `<a href="lesson.html?id=${esc(p.id)}">${arrow} ${esc(p.label)}</a>`).join('');
    const resHTML = (data.resources || []).map(r => `<a href="${esc(r.url)}" target="_blank" rel="noopener">${extLink}<span>${esc(r.name)}</span><span class="kind">${esc(r.kind || '')}</span></a>`).join('');
    const playIcon = '<svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M4 2.8v10.4L13.2 8 4 2.8z"/></svg>';
    const videoHTML = data.video && data.video.url
      ? `<div class="ls-hero-actions">
          <a class="ls-video-btn" href="${esc(data.video.url)}" target="_blank" rel="noopener">${playIcon}${esc(data.video.label || 'Watch walkthrough')}</a>
          ${data.video.note ? `<span class="ls-video-note">${esc(data.video.note)}</span>` : ''}
        </div>`
      : '';

    main.innerHTML = `
      <header class="ls-hero">
        <div class="wrap">
          <a href="skills.html" class="crumb">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 3L5 7l4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Skills curriculum
          </a>
          <div class="ls-meta">
            <span class="ls-tag track" style="--ic-fg:${tm.fg};--ic-bg:${tm.bg}">${esc(tm.label)}</span>
            <span class="ls-tag ${levelClass[data.level] || ''}">${esc(data.level)}</span>
            <span class="ls-tag tool">${esc(data.tool)}</span>
            <span class="ls-tag tool">${esc(data.time)}</span>
          </div>
          <h1>${esc(data.title)}</h1>
          <p class="ls-lede">${data.lede}</p>
          ${videoHTML}
          <div class="lesson-track">
            <div class="lesson-pct" id="lessonPctWrap" hidden>
              <div class="lesson-pct-row">
                <span>Lesson progress</span>
                <strong id="lessonPctLabel">0%</strong>
              </div>
              <div class="lesson-pct-bar" aria-hidden="true"><span id="lessonPctFill"></span></div>
            </div>
            <div id="lessonProgress" class="track-rail" data-progress-kind="skills" data-progress-id="${esc(id)}" data-progress-label="${esc(data.title)}" data-login-next="lesson.html?id=${esc(id)}" hidden></div>
          </div>
        </div>
      </header>
      <div class="ls-body">
        <div class="wrap ls-layout">
          <article class="ls-article">
            ${bodyHTML}
            <div class="ls-pager">
              ${prev ? `<a class="prev" href="lesson.html?id=${esc(prevId)}"><span class="dir">← Previous</span><span class="ttl">${esc(prev.title)}</span></a>` : '<span class="ph"></span>'}
              ${next ? `<a class="next" href="lesson.html?id=${esc(nextId)}"><span class="dir">Next →</span><span class="ttl">${esc(next.title)}</span></a>` : '<span class="ph"></span>'}
            </div>
          </article>
          <aside class="ls-side">
            ${toc.length ? `<div class="ls-card toc-card"><h3>On this page</h3><nav class="ls-toc" id="toc">${tocHTML}</nav></div>` : ''}
            ${learnHTML ? `<div class="ls-card"><h3>What you'll learn</h3><ul class="ls-learn">${learnHTML}</ul></div>` : ''}
            <div class="ls-card"><h3>At a glance</h3><dl class="ls-facts">${factsHTML}</dl></div>
            ${prereqHTML ? `<div class="ls-card"><h3>Before this</h3><div class="ls-prereq">${prereqHTML}</div></div>` : ''}
            ${resHTML ? `<div class="ls-card"><h3>Go deeper</h3><div class="ls-side-links">${resHTML}</div></div>` : ''}
            ${data.unlock ? `<div class="ls-card ls-unlock-card"><h3>Apply it</h3><p>${data.unlock.blurb || 'Put this skill to work on a real dataset.'}</p><a class="ls-unlock-btn" href="${esc(data.unlock.url)}">${esc(data.unlock.label)} ${arrow}</a></div>` : ''}
          </aside>
        </div>
      </div>`;

    // Copy buttons
    document.querySelectorAll('.ls-copy').forEach(btn => {
      btn.addEventListener('click', () => {
        const code = btn.closest('.ls-code').querySelector('code').innerText;
        navigator.clipboard.writeText(code).then(() => {
          btn.classList.add('copied');
          const label = btn.querySelector('span');
          const old = label.textContent; label.textContent = 'Copied';
          setTimeout(() => { btn.classList.remove('copied'); label.textContent = old; }, 1500);
        });
      });
    });

    // Reading progress + TOC scroll-spy + account % by section
    const bar = document.getElementById('progressBar');
    const tocLinks = Array.from(document.querySelectorAll('#toc a'));
    const headings = toc.map(t => document.getElementById(t.id)).filter(Boolean);
    const pctWrap = document.getElementById('lessonPctWrap');
    const pctLabel = document.getElementById('lessonPctLabel');
    const pctFill = document.getElementById('lessonPctFill');
    const sectionCount = Math.max(headings.length, 1);
    let maxPct = 0;
    let saveTimer = null;

    if (window.TerrainAuth && TerrainAuth.isLoggedIn()) {
      const cached = TerrainAuth.getProgress() || {};
      const item = cached.skills && cached.skills[id];
      if (item && item.meta && typeof item.meta.percent === 'number') {
        maxPct = Math.max(0, Math.min(100, item.meta.percent));
      }
      if (pctWrap) pctWrap.hidden = false;
      paintLessonPct(maxPct);
    }

    function paintLessonPct(pct) {
      if (pctLabel) pctLabel.textContent = Math.round(pct) + '%';
      if (pctFill) pctFill.style.width = Math.round(pct) + '%';
    }

    function saveLessonPct(pct, status) {
      if (!window.TerrainProgressUI || !TerrainAuth.isLoggedIn()) return;
      clearTimeout(saveTimer);
      saveTimer = setTimeout(function () {
        TerrainProgressUI.setStatus('skills', id, status, data.title, {
          silent: true,
          quietDone: true,
          meta: { percent: Math.round(pct), sections: sectionCount }
        }).then(function () {
          TerrainProgressUI.refreshAll(document.getElementById('main') || document);
        }).catch(function () {});
      }, 400);
    }

    function onScroll(){
      const h = document.documentElement;
      const scrolled = h.scrollTop / Math.max(1, (h.scrollHeight - h.clientHeight));
      bar.style.width = Math.min(100, Math.max(0, scrolled * 100)) + '%';
      let active = -1;
      headings.forEach((el, i) => { if (el.getBoundingClientRect().top <= 120) active = i; });
      tocLinks.forEach((a, i) => a.classList.toggle('active', i === active));

      if (window.TerrainAuth && TerrainAuth.isLoggedIn() && headings.length) {
        /* Sections reached (0-based active) → percent through the lesson */
        const reached = active < 0 ? 0 : active + 1;
        let pct = Math.round((reached / sectionCount) * 100);
        if (scrolled > 0.92) pct = 100;
        if (pct > maxPct) {
          maxPct = pct;
          paintLessonPct(maxPct);
          const status = maxPct >= 100 ? 'done' : 'in_progress';
          saveLessonPct(maxPct, status);
        } else if (maxPct === 0 && scrolled > 0.02) {
          maxPct = Math.max(1, pct);
          paintLessonPct(maxPct);
          saveLessonPct(maxPct, 'in_progress');
        }
      }
    }
    document.addEventListener('scroll', onScroll, { passive: true });
    onScroll();

    if (window.TerrainProgressUI) {
      TerrainProgressUI.mount(document.getElementById('main') || document);
    }
  }
</script>
<script src="assets/site-nav.js?v=9"></script>
</body>
</html>
