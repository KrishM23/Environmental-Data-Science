<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choose a new password | Terrain</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;450;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/site-nav.css?v=9">
<link rel="stylesheet" href="assets/terrain-soft.css?v=4">
<link rel="stylesheet" href="assets/auth.css?v=5">
<style>
  :root {
    --paper: #FBFAF6; --paper-2: #F3F1E8; --ink: #1B2A26; --ink-soft: #4A5A54;
    --moss: #2F6B4F; --moss-deep: #1F4D38; --line: #E3DFD2; --glow: #C7E0A8;
    --radius: 16px; --maxw: 1180px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: var(--paper); color: var(--ink); line-height: 1.6; -webkit-font-smoothing: antialiased; }
  ::selection { background: var(--glow); color: var(--ink); }
  .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 28px; }
  a { color: inherit; }
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(251,250,246,0.82); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
  }
  .nav-inner { display: flex; align-items: center; justify-content: space-between; height: 64px; }
  .logo { display: flex; align-items: center; text-decoration: none; }
  .logo-mark { height: 40px; width: auto; display: block; }
  .nav-links { display: flex; align-items: center; gap: 2px; }
</style>
</head>
<body>
<nav>
  <div class="wrap nav-inner">
    <a href="index.html" class="logo" aria-label="Terrain">
      <img src="assets/terrain-logo.png" alt="" class="logo-mark" height="40">
    </a>
    <div class="nav-links" id="siteNavMenu"></div>
    <button type="button" class="nav-toggle" id="navToggle" aria-expanded="false" aria-controls="siteNavMenu" aria-label="Open menu">
      <span class="nav-toggle-bars" aria-hidden="true">
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
      </span>
    </button>
  </div>
</nav>
<div class="nav-backdrop" id="navBackdrop" aria-hidden="true"></div>

<main class="auth-shell">
  <div class="auth-card">
    <h1>Choose a new password</h1>
    <p class="auth-lede">Enter a new password with at least 8 characters, including a letter and a number.</p>
    <div class="auth-error" id="authError" role="alert"></div>
    <form id="resetForm" novalidate>
      <div class="auth-field" id="passwordField">
        <label for="password">New password</label>
        <div class="auth-pass-wrap">
          <input id="password" name="password" type="password" autocomplete="new-password" required minlength="8" placeholder="At least 8 characters">
          <button type="button" class="auth-toggle-pass" id="togglePass" aria-label="Show password">Show</button>
        </div>
        <div class="auth-strength" id="strength" data-score="0"><span></span><span></span><span></span><span></span></div>
        <div class="auth-strength-label" id="strengthLabel">Use 8+ characters with a letter and a number.</div>
        <div class="auth-field-error" id="passwordErr"></div>
      </div>
      <div class="auth-field" id="confirmField">
        <label for="confirm">Confirm new password</label>
        <input id="confirm" name="confirm" type="password" autocomplete="new-password" required placeholder="Re-enter password">
        <div class="auth-field-error" id="confirmErr"></div>
      </div>
      <button type="submit" class="auth-submit" id="submitBtn">Update password</button>
    </form>
    <p class="auth-foot"><a href="login.html">Back to log in</a></p>
  </div>
</main>

<script src="assets/site-config.js"></script>
<script src="assets/auth.js?v=4"></script>
<script src="assets/site-nav.js?v=9"></script>
<script>
(function () {
  var token = new URLSearchParams(location.search).get('token') || '';
  var err = document.getElementById('authError');
  var form = document.getElementById('resetForm');
  var btn = document.getElementById('submitBtn');

  if (!token) {
    err.textContent = 'This reset link is missing or incomplete. Request a new one.';
    err.classList.add('is-visible');
    form.hidden = true;
  }

  document.getElementById('togglePass').addEventListener('click', function () {
    var input = document.getElementById('password');
    var show = input.type === 'password';
    input.type = show ? 'text' : 'password';
    this.textContent = show ? 'Hide' : 'Show';
  });

  document.getElementById('password').addEventListener('input', function () {
    var score = TerrainAuth.passwordStrength(this.value);
    document.getElementById('strength').setAttribute('data-score', String(score));
    document.getElementById('strengthLabel').textContent =
      TerrainAuth.passwordPolicyError(this.value) || 'Looks good.';
  });

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    err.classList.remove('is-visible');
    ['passwordField', 'confirmField'].forEach(function (id) {
      document.getElementById(id).classList.remove('has-error');
    });
    ['passwordErr', 'confirmErr'].forEach(function (id) {
      document.getElementById(id).classList.remove('is-visible');
    });

    var password = document.getElementById('password').value;
    var confirm = document.getElementById('confirm').value;
    var pwErr = TerrainAuth.passwordPolicyError(password);
    var valid = true;
    if (pwErr) {
      document.getElementById('passwordField').classList.add('has-error');
      var pe = document.getElementById('passwordErr');
      pe.textContent = pwErr;
      pe.classList.add('is-visible');
      valid = false;
    }
    if (password !== confirm) {
      document.getElementById('confirmField').classList.add('has-error');
      var ce = document.getElementById('confirmErr');
      ce.textContent = 'Passwords do not match.';
      ce.classList.add('is-visible');
      valid = false;
    }
    if (!valid) return;

    btn.disabled = true;
    btn.textContent = 'Updating…';
    try {
      await TerrainAuth.resetPassword(token, password);
      location.href = 'login.html?reset=1';
    } catch (ex) {
      err.textContent = ex.message || 'Could not update password.';
      err.classList.add('is-visible');
      btn.disabled = false;
      btn.textContent = 'Update password';
    }
  });
})();
</script>
</body>
</html>
