<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Application received | Internship at Terrain</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #FBFAF6; --ink: #1B2A26; --ink-soft: #4A5A54;
    --moss: #2F6B4F; --moss-deep: #1F4D38; --line: #E3DFD2; --glow: #C7E0A8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif; background: var(--paper); color: var(--ink);
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 40px 24px; text-align: center;
  }
  .card {
    max-width: 520px; background: #fff; border: 1px solid var(--line);
    border-radius: 20px; padding: 48px 36px;
    box-shadow: 0 24px 48px -24px rgba(27,42,38,.18);
  }
  .mark {
    width: 64px; height: 64px; border-radius: 50%; background: var(--glow);
    display: grid; place-items: center; margin: 0 auto 22px; color: var(--moss-deep);
  }
  h1 {
    font-family: 'Fraunces', serif; font-size: clamp(28px, 5vw, 36px);
    font-weight: 600; letter-spacing: -.02em; margin-bottom: 14px;
  }
  p { font-size: 17px; color: var(--ink-soft); line-height: 1.55; margin-bottom: 16px; }
  .actions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 28px; }
  a {
    display: inline-flex; align-items: center; gap: 8px; text-decoration: none;
    padding: 14px 22px; border-radius: 12px; font-weight: 500; font-size: 15px;
    transition: background .2s, transform .2s, border-color .2s;
  }
  a.primary { background: var(--moss); color: #fff; }
  a.primary:hover { background: var(--moss-deep); transform: translateY(-2px); }
  a.secondary { border: 1px solid var(--line); color: var(--ink); background: #fff; }
  a.secondary:hover { border-color: var(--moss); color: var(--moss); }
</style>
</head>
<body>
  <div class="card">
    <div class="mark" aria-hidden="true">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none"><path d="M5 12.5 10 17.5 19.5 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <h1>Application received</h1>
    <p>Thank you for applying to the <strong>Terrain summer internship</strong>. We are pleased to receive your application.</p>
    <p>Please expect a response within one week. Check your inbox and spam folder if you do not see a reply.</p>
    <div class="actions">
      <a class="primary" href="projects.html">See the projects</a>
      <a class="secondary" href="index.html">Back to home</a>
    </div>
  </div>
</body>
</html>
